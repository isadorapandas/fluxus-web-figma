name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # Ou 'master', dependendo da sua branch padrão

# Permite que o fluxo de trabalho tenha permissão para implantar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas uma implantação seja executada por vez
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # Se houver um package-lock.json, usa 'npm ci', caso contrário roda 'npm install'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
